<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>DeFi Activity Monitor</title>
 <style>
 :root {
 --bg:#0b1020;
 --card:#121a2f;
 --card2:#192440;
 --text:#e8eefc;
 --muted:#93a4c8;
 --accent:#6ea8fe;
 --border:rgba(255,255,255,.08);
 }
 * { box-sizing:border-box; }
 body {
 margin:0;
 font-family:Inter,system-ui,sans-serif;
 background:linear-gradient(180deg,#0b1020,#111831);
 color:var(--text);
 }
 .wrap {
 max-width:1100px;
 margin:0 auto;
 padding:24px;
 }
 .hero,.card,.stat {
 background:var(--card);
 border:1px solid var(--border);
 border-radius:16px;
 }
 .hero { padding:24px; }
 .card { padding:18px; }
 .stats {
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:12px;
 margin-top:16px;
 }
 .stat { padding:14px; }
 .scan {
 display:flex;
 gap:10px;
 margin-top:16px;
 }
 input,select,button {
 border-radius:12px;
 border:1px solid var(--border);
 padding:12px 14px;
 font:inherit;
 }
 input,select {
 background:var(--card2);
 color:var(--text);
 width:100%;
 }
 button {
 background:var(--accent);
 color:#08111f;
 font-weight:700;
 cursor:pointer;
 }
 .row {
 display:grid;
 grid-template-columns:2fr 1fr;
 gap:16px;
 margin-top:16px;
 }
 table {
 width:100%;
 border-collapse:collapse;
 margin-top:10px;
 }
 th,td {
 padding:10px 8px;
 border-bottom:1px solid var(--border);
 text-align:left;
 }
 th {
 color:var(--muted);
 font-size:12px;
 text-transform:uppercase;
 }
 pre {
 white-space:pre-wrap;
 background:#0c1326;
 border:1px solid var(--border);
 border-radius:12px;
 padding:12px;
 }
 .lbl {
 color:var(--muted);
 font-size:12px;
 margin-bottom:6px;
 }
 .val {
 font-size:22px;
 font-weight:700;
 }
 .sub,.muted { color:var(--muted); }
 .pill {
 display:inline-block;
 padding:4px 10px;
 border-radius:999px;background:#1f2e57;
 color:#b8cbf5;
 font-size:12px;
 margin-right:6px;
 }
 @media (max-width:900px){
 .row,.stats { grid-template-columns:1fr; }
 .scan { flex-direction:column; }
 }
 </style>
</head>
<body>
<div class="wrap">
 <div class="hero">
 <h1>DeFi Activity Monitor</h1>
 <p class="sub">MVP для Netlify: Aave работает, NAVI и Nostra — каркас.</p>
 <div class="scan">
 <input id="wallet" placeholder="Вставь адрес кошелька" />
 <select id="chain">
 <option value="auto">Автоопределение</option>
 <option value="ethereum">Ethereum</option>
 <option value="arbitrum">Arbitrum</option>
 <option value="base">Base</option>
 <option value="sui">Sui</option>
 <option value="starknet">Starknet</option>
 </select>
 <button onclick="scanWallet()">Сканировать</button>
 </div>
 </div>

 <div class="stats">
 <div class="stat"><div class="lbl">Протокол</div><div class="val" id="proto">—</div></div>
 <div class="stat"><div class="lbl">Supply USD</div><div class="val" id="sup">—</div></div>
 <div class="stat"><div class="lbl">Borrow USD</div><div class="val" id="bor">—</div></div>
 <div class="stat"><div class="lbl">Health Factor</div><div class="val" id="hf">—</div></div>
 </div>

 <div class="row">
 <div class="card">
 <h2>Позиции</h2>
 <div id="badges"></div>
 <table>
 <thead>
 <tr>
 <th>Актив</th>
 <th>Роль</th>
 <th>Amount</th>
 <th>USD</th>
 </tr>
 </thead>
 <tbody id="assets">
 <tr><td colspan="4" class="muted">Нет данных</td></tr>
 </tbody>
 </table>
 </div>

 <div class="card">
 <h2>Raw response</h2>
 <pre id="raw">Ожидание запроса</pre>
 </div>
 </div>
</div>

<script>
function fmtUsd(v){
 if(v===null||v===undefined||isNaN(v)) return '—';
 return new Intl.NumberFormat('ru-RU',{
 style:'currency',
 currency:'USD',
 maximumFractionDigits:2
 }).format(Number(v));
}

function detectChain(addr){
 if(!addr) return 'auto';
 if(addr.startsWith('0x') && addr.length===42) return 'arbitrum';
 if(addr.startsWith('0x') && addr.length>42) return 'starknet';
 if(addr.length >= 32 && !addr.startsWith('0x')) return 'sui';
 return 'auto';
}

async function scanWallet(){
 const wallet = document.getElementById('wallet').value.trim();
 let chain = document.getElementById('chain').value;

 if(chain==='auto') chain = detectChain(wallet);

 let endpoint = '';
 if(['ethereum','arbitrum','base'].includes(chain)) {
 endpoint='/.netlify/functions/aave-positions';
 } else if(chain==='sui') {
 endpoint='/.netlify/functions/navi-positions';
 } else if(chain==='starknet') {
 endpoint='/.netlify/functions/nostra-positions';
 } else {
 alert('Не удалось определить сеть');
 return;
 }

 const res = await fetch(endpoint,{
 method:'POST',
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({wallet,chain})
 });

 const data = await res.json();

 document.getElementById('raw').textContent = JSON.stringify(data,null,2);
 document.getElementById('proto').textContent = data.protocol || '—';
 document.getElementById('sup').textContent = fmtUsd(data.suppliedUSD);
 document.getElementById('bor').textContent = fmtUsd(data.borrowedUSD);
 document.getElementById('hf').textContent = data.healthFactor ?? '—';

 document.getElementById('badges').innerHTML =
 `<span class="pill">${data.chain || chain}</span><span class="pill">${data.protocol || 'unknown'}</span>`;

 const items = data.assets || [];
 document.getElementById('assets').innerHTML = items.length
 ? items.map(a => `
 <tr>
 <td>${a.symbol || '?'}</td>
 <td>${a.role || '—'}</td>
 <td>${a.amount ?? '—'}</td>
 <td>${fmtUsd(a.usdValue)}</td>
 </tr>
 `).join('')
 : '<tr><td colspan="4" class="muted">Пока нет данных</td></tr>';
}
</script>
</body>
</html>
